global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: whoknows-go-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - syntax-reborndev.com:8080

  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

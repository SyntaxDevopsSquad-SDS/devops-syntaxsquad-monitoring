name: Validate Monitoring Stack

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose syntax
        run: docker compose config

      - name: Validate Grafana dashboard JSON
        run: jq empty grafana/dashboards/whoknows-overview.json

      - name: Validate Prometheus config with promtool
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "$PWD/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.54.1 \
            check config /etc/prometheus/prometheus.yml

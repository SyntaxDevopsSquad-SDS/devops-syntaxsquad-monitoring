events {}

http {
  server {
    listen 80;
    server_name _;

    # ACME HTTP-01 challenge endpoint for Certbot.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Everything else is redirected to HTTPS.
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/monitor.syntax-reborndev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.syntax-reborndev.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    location / {
      proxy_pass http://grafana:3000/;
      proxy_redirect / /;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # Force trailing slash for consistent Prometheus routing.
    location = /prometheus {
      return 301 /prometheus/;
    }

    location /prometheus/ {
      proxy_pass http://prometheus:9090/prometheus/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /prometheus;
    }
  }
}
